name: sprint
description: "Sprint Duels Flutter rewrite"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  audioplayers: ^6.1.0
  collection: ^1.19.1
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1
  firebase_core: ^4.1.0
  firebase_database: ^12.0.3
  shared_preferences: ^2.5.3
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.6.0
  drift_dev: ^2.29.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/beeps/start.wav
    - assets/sounds/beeps/beep_electronic.wav
    - assets/sounds/beeps/beep_buzzer.wav
    - assets/sounds/beeps/beep_sine.wav
    - assets/sounds/beeps/beep_gamestart.wav
    - assets/sounds/beeps/beep_gamestart2.wav
    - assets/sounds/beeps/beep_b1_improved.wav
    - assets/sounds/beeps/beep_b1_loud.wav
    - assets/sounds/beeps/beep_b1_normalized.wav
    - assets/sounds/beeps/beep_b1_max.wav
